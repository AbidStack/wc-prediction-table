<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prediction Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen p-4">

<div class="max-w-7xl mx-auto">

    <h1 class="text-4xl font-bold text-center mb-8">
        FIFA WC 2026 Prediction Dashboard
    </h1>

    <!-- ROUND + MATCH -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <select id="roundSelect"
            class="bg-slate-800 border border-slate-700 rounded-xl p-3">
        </select>

        <select id="matchSelect"
            class="bg-slate-800 border border-slate-700 rounded-xl p-3">
        </select>
    </div>

    <!-- MATCH CARD -->
    <div id="matchCard"></div>

    <!-- PREDICTIONS -->
    <h2 class="text-3xl font-bold mt-8 mb-4">
        Predictions
    </h2>

    <div id="predictions" class="grid gap-4"></div>

</div>

<script>
const MATCH_API = "https://worldcup26.ir/get/games";
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzfFdsmWNxM6ClEVpXIiT57uG3DmtGHr4kGyj_8sUe4RRlzdFMxFYSOT4hw6EELvKh3_A/exec";

let matches = [];

function roundLabel(type) {
    const map = {
        r32: "Round of 32",
        r16: "Round of 16",
        qf: "Quarter Final",
        sf: "Semi Final",
        final: "Final"
    };
    return map[type] || type;
}

function parseScorers(str) {
    if (!str || str === "null") return [];
    return str
        .replace(/[{}"]/g, "")
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);
}

async function init() {
    const res = await fetch(MATCH_API);
    const data = await res.json();

    matches = data.games.filter(m =>
        ["r32","r16","qf","sf","final"].includes(m.type)
    );

    renderRounds();
}

function renderRounds() {
    const rounds = [...new Set(matches.map(m => m.type))];

    roundSelect.innerHTML = rounds.map(r =>
        `<option value="${r}">${roundLabel(r)}</option>`
    ).join("");

    roundSelect.onchange = renderMatches;
    renderMatches();
}

function renderMatches() {
    const round = roundSelect.value;
    const filtered = matches.filter(m => m.type === round);

    matchSelect.innerHTML = filtered.map((m,i)=>`
        <option value="${m.id}">
            Match ${i+1} — ${m.home_team_name_en} vs ${m.away_team_name_en}
        </option>
    `).join("");

    matchSelect.onchange = renderPage;
    renderPage();
}

async function renderPage() {
    renderMatchCard();
    await loadPredictions();
}

function renderMatchCard() {
    const match = matches.find(
        m => m.id === matchSelect.value
    );

    if (!match) return;

    const homeScorers = parseScorers(match.home_scorers);
    const awayScorers = parseScorers(match.away_scorers);

    const penaltyExists =
        match.home_penalty_score &&
        match.home_penalty_score !== "null";

    document.getElementById("matchCard").innerHTML = `
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6">
            <div class="text-center text-3xl font-bold">
                ${match.home_team_name_en}
            </div>

            <div class="text-center text-5xl font-bold text-blue-400 my-4">
                ${match.home_score} - ${match.away_score}
            </div>

            <div class="text-center text-3xl font-bold">
                ${match.away_team_name_en}
            </div>

            ${
                homeScorers.length || awayScorers.length
                ? `
                <div class="grid md:grid-cols-2 gap-4 mt-6">
                    ${
                        homeScorers.length
                        ? `
                        <div class="bg-slate-800 rounded-xl p-4">
                            <div class="font-bold text-green-400 mb-2">
                                ${match.home_team_name_en} Scorers
                            </div>
                            ${homeScorers.map(s=>`<div>${s}</div>`).join("")}
                        </div>
                        `
                        : ""
                    }

                    ${
                        awayScorers.length
                        ? `
                        <div class="bg-slate-800 rounded-xl p-4">
                            <div class="font-bold text-green-400 mb-2">
                                ${match.away_team_name_en} Scorers
                            </div>
                            ${awayScorers.map(s=>`<div>${s}</div>`).join("")}
                        </div>
                        `
                        : ""
                    }
                </div>
                `
                : ""
            }

            ${
                penaltyExists
                ? `
                <div class="mt-6 bg-yellow-900/40 border border-yellow-500 rounded-xl p-4 text-center">
                    Penalty:
                    ${match.home_penalty_score}
                    -
                    ${match.away_penalty_score}
                </div>
                `
                : ""
            }
        </div>
    `;
}

async function loadPredictions() {
    const matchId = matchSelect.value;

    const res = await fetch(
        `${GAS_URL}?action=predictions&match_id=${matchId}`
    );

    const data = await res.json();

    renderPredictions(data.predictions || []);
}

function renderPredictions(predictions) {
    const container = document.getElementById("predictions");

    if (!predictions.length) {
        container.innerHTML = `
            <div class="bg-slate-900 rounded-xl p-6 text-center text-slate-400">
                No predictions yet
            </div>
        `;
        return;
    }

    container.innerHTML = predictions.map(p => `
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-5">

            <div class="text-2xl font-bold mb-3">
                ${p.player}
            </div>

            <div class="mb-2">
                Score:
                <span class="font-bold text-blue-400">
                    ${p.home_score} - ${p.away_score}
                </span>
            </div>

            ${
                p.home_scorers
                ? `
                <div class="mb-2">
                    Home scorers:
                    ${p.home_scorers}
                </div>
                `
                : ""
            }

            ${
                p.away_scorers
                ? `
                <div class="mb-2">
                    Away scorers:
                    ${p.away_scorers}
                </div>
                `
                : ""
            }

            ${
                p.home_penalty
                ? `
                <div class="mt-3 text-yellow-400 font-semibold">
                    Penalty:
                    ${p.home_penalty} - ${p.away_penalty}
                </div>
                `
                : ""
            }

            ${
                p.home_penalty_scorers
                ? `
                <div class="mt-2">
                    Home Penalty Scorers:
                    ${p.home_penalty_scorers}
                </div>
                `
                : ""
            }

            ${
                p.away_penalty_scorers
                ? `
                <div class="mt-2">
                    Away Penalty Scorers:
                    ${p.away_penalty_scorers}
                </div>
                `
                : ""
            }

        </div>
    `).join("");
}

init();
</script>
</body>
</html>
