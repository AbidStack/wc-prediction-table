<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Point Table</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        .english-font {
  font-family: "Roboto Slab", serif;
}

    </style>
</head>

<body class="bg-slate-950 min-h-screen flex items-center justify-center p-1 text-white english-font">

    <div class="w-screen max-w-5xl bg-slate-900 rounded-xl shadow-2xl border-2 border-white overflow-hidden">

        <!-- Title -->
        <div class="text-center text-4xl font-bold py-5 border-b-2 border-slate-600 bg-slate-800">
            Point Table
        </div>

        <!-- Total Prediction -->
        <div class="grid grid-cols-2 border-b-2 border-slate-600">
            <div class="text-2xl font-semibold p-2 border-r-2 border-slate-600 text-center">
                Total Prediction
            </div>
            <div id="totalPrediction" class="text-2xl font-bold p-2 text-center">
                9
            </div>
        </div>

        <!-- Table -->
        <table class="w-full border-collapse">
            <thead>
                <tr class="bg-slate-800">
                    <th class="border border-slate-600 p-2 w-24">Rank</th>
                    <th class="border border-slate-600 p-2 text-left">Name</th>
                    <th class="border border-slate-600 p-2 text-center">
                        Correct Prediction 🔮
                    </th>
                    <th class="border border-slate-600 p-2 text-center">
                        Points
                    </th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyww_0wNWbcETpSHK4eQMYeU6y8Xg5ajN_FpUuL3AK5bAi1immrg2AH6lCbvtNKd3ZmsQ/exec";

        function getRankColor(rank, totalPlayers) {
            const ratio = (rank - 1) / Math.max(totalPlayers - 1, 1);

            let r, g;

            if (ratio < 0.5) {
                // Green -> Yellow
                r = Math.floor(255 * (ratio * 2));
                g = 255;
            } else {
                // Yellow -> Red
                r = 255;
                g = Math.floor(255 * (1 - (ratio - 0.5) * 2));
            }

            return `rgb(${r}, ${g}, 0)`;
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(API_URL);
                let players = await response.json();

                // Convert to numbers (important if sheet returns strings)
                players = players.map(player => ({
                    ...player,
                    points: Number(player.points),
                    correct: Number(player.correct)
                }));

                // Sort by points descending
                players.sort((a, b) => b.points - a.points);

                // Tie-aware ranking
                let previousPoints = null;
                let currentRank = 0;

                players = players.map((player, index) => {
                    if (player.points !== previousPoints) {
                        currentRank = index + 1;
                    }

                    previousPoints = player.points;

                    return {
                        ...player,
                        rank: currentRank
                    };
                });

                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";

                const totalPlayers = players.length;

                players.forEach(player => {
                    const row = document.createElement("tr");
                    row.className = "hover:bg-slate-800 transition";

                    const rankColor = getRankColor(player.rank, totalPlayers);

                    row.innerHTML = `
                <td class="border border-slate-600 p-4 text-center font-bold"
                    style="background:${rankColor}; color:black;">
                    ${player.rank}
                </td>
                <td class="border border-slate-600 p-4">
                    ${player.name}
                </td>
                <td class="border border-slate-600 p-4 text-center">
                    ${player.correct}
                </td>
                <td class="border border-slate-600 p-4 text-center font-semibold">
                    ${player.points}
                </td>
            `;

                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error("Leaderboard error:", error);
            }
        }

        loadLeaderboard();

        // Auto refresh every 10 sec
        setInterval(loadLeaderboard, 10000);
    </script>
</body>

</html>
