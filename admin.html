<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="custom.css">
</head>

<body class="bg-slate-950 text-white min-h-screen p-4 md:p-8 english-font">

<div class="max-w-5xl mx-auto">

    <h1 class="text-4xl md:text-5xl font-bold text-center mb-8">
        FIFA WC Prediction Admin
    </h1>

    <!-- Login Card -->
    <div id="loginCard"
         class="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-xl mx-auto space-y-4">

        <h2 class="text-2xl font-bold text-center">Admin Login</h2>

        <input
            id="adminId"
            type="text"
            placeholder="Admin ID"
            class="w-full bg-slate-800 rounded-xl p-3 outline-none"
        />

        <input
            id="adminPass"
            type="password"
            placeholder="Password"
            class="w-full bg-slate-800 rounded-xl p-3 outline-none"
        />

        <button
            onclick="login()"
            class="w-full bg-blue-600 hover:bg-blue-500 rounded-xl py-3 font-semibold"
        >
            Login
        </button>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="hidden space-y-6">

        <!-- Step 1 -->
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6">
            <h2 class="text-2xl font-bold mb-4">1. Select Player</h2>

            <select
                id="playerSelect"
                onchange="handlePlayerSelect()"
                class="w-full bg-slate-800 rounded-xl p-3"
            >
                <option value="">Select Player</option>
            </select>

            <div id="createPlayerBox" class="hidden mt-4 space-y-4">
                <input
                    id="newPlayerName"
                    placeholder="New Player Name"
                    class="w-full bg-slate-800 rounded-xl p-3"
                />

                <button
                    onclick="createPlayer()"
                    class="w-full bg-green-600 rounded-xl py-3"
                >
                    Create Player
                </button>
            </div>
        </div>

        <!-- Step 2 -->
        <div id="roundCard"
             class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-6">

            <h2 class="text-2xl font-bold mb-4">2. Select Round</h2>

            <select
                id="roundSelect"
                onchange="loadMatches()"
                class="w-full bg-slate-800 rounded-xl p-3"
            >
                <option value="">Select Round</option>
                <option value="r32">Round of 32</option>
                <option value="r16">Round of 16</option>
                <option value="qf">Quarter Final</option>
                <option value="sf">Semi Final</option>
                <option value="final">Final</option>
            </select>
        </div>

        <!-- Step 3 -->
        <div id="matchCard"
             class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-6">

            <h2 class="text-2xl font-bold mb-4">3. Select Match</h2>

            <select
                id="matchSelect"
                onchange="selectMatch()"
                class="w-full bg-slate-800 rounded-xl p-3"
            ></select>
        </div>

        <!-- Match Preview -->
        <div id="matchPreview"></div>

        <!-- Step 4 -->
        <div id="scoreCard"
             class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-6">

            <h2 class="text-2xl font-bold mb-4">4. Enter Prediction</h2>

            <!-- Scores -->
            <div id="scoreInputs"></div>

            <!-- Goal scorers -->
            <div id="scorersContainer"></div>

            <!-- Penalties -->
            <div id="penaltyContainer"></div>

            <!-- Save -->
            <button
                id="saveBtn"
                onclick="savePrediction()"
                class="hidden mt-6 w-full bg-green-600 hover:bg-green-500 rounded-xl py-4 font-bold text-lg"
            >
                Save Prediction
            </button>
        </div>

    </div>
</div>

<script src="index.js"></script>
</body>
</html>
